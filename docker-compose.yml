services:
  backend:
    image: nilsost/nlpt-kiosk-controller-backend:${NKC_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
    ports:
      - ${BIND_IP:-0.0.0.0}:8765:8765
      - ${MONITORING_IP:-0.0.0.0}:8001:8001

  frontend:
    image: nilsost/nlpt-kiosk-controller-frontend:${NKC_VERSION:-latest}
    restart: unless-stopped

  haproxy:
    image: nilsost/nlpt-kiosk-controller-haproxy:${NKC_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - ${BIND_IP:-0.0.0.0}:80:80
      - ${BIND_IP:-0.0.0.0}:443:443
      - ${MONITORING_IP:-0.0.0.0}:8404:8404
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0

  mongodb:
    image: mongo:4.4
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db:rw

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=nkc
      - MINIO_ROOT_PASSWORD=password
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data:rw

  timeserver:
    image: cturra/ntp:latest
    restart: unless-stopped
    ports:
      - ${BIND_IP:-0.0.0.0}:123:123/udp
    environment:
      - NTP_SERVERS=de.pool.ntp.org
      - TZ=Europe/Berlin

volumes:
  mongo_data:
  minio_data:
