<div class="w-fit p-2 pt-1 bg-timeline-card rounded-xl shadow-md flex flex-col text-1xl">
    <div class="flex flex-row justify-between items-start gap-5 mb-1">
        <div class="flex flex-row items-center gap-1 mt-1 ml-1">
            <div class="text-highlight" *ngIf="timeline().template_id">{{ timelineTemplates().get(timeline().template_id!)!.desc }}</div>
            <div class="text-highlight" *ngIf="!timeline().template_id">???</div>
        </div>
        <div class="flex flex-row items-center gap-1 mt-1">
            <i class="pi pi-user !text-1xl"></i>
            <div *ngIf="timeline().template_id">{{ users().get(timelineTemplates().get(timeline().template_id!)!.user_id!)!.login }}</div>
            <div *ngIf="!timeline().template_id">???</div>
        </div>
        <div class="flex flex-row gap-2">
            <i class="pi pi-star-fill !text-1xl" pTooltip="default Timeline of this Kiosk" showDelay="300" tooltipPosition="top" *ngIf="timeline().default"></i>
            <i class="pi pi-gauge !text-1xl" pTooltip="gets deleted after been displayed" showDelay="300" tooltipPosition="top" *ngIf="!editActive && timeline().single_shot"></i>
            <i class="pi pi-history !text-1xl" pTooltip="returns to other Timelines after been displayed" showDelay="300" tooltipPosition="top" *ngIf="!timeline().default && !editActive && !timeline().single_shot"></i>
            <i class="pi pi-gauge !text-1xl hover:cursor-pointer hover:text-highlight" pTooltip="single use - change to multi usage" showDelay="300" tooltipPosition="top" (click)="timeline().single_shot = false" *ngIf="!timeline().default && editActive && timeline().single_shot"></i>
            <i class="pi pi-history !text-1xl hover:cursor-pointer hover:text-highlight" pTooltip="multi use - change to single usage" showDelay="300" tooltipPosition="top" (click)="timeline().single_shot = true" *ngIf="!timeline().default && editActive && !timeline().single_shot"></i>
            <i class="pi pi-pencil !text-1xl hover:cursor-pointer hover:text-highlight" pTooltip="edit" showDelay="300" tooltipPosition="top" (click)="editActive = true" *ngIf="!editActive && !timeline().locked && !roMode()"></i>
            <i class="pi pi-lock !text-1xl text-danger" pTooltip="displayed by (common) Kiosk" showDelay="300" tooltipPosition="top" *ngIf="timeline().locked"></i>
            <i class="pi pi-unlock !text-1xl text-warn" pTooltip="displayed by (uncommon) Kiosk" showDelay="300" tooltipPosition="top" *ngIf="timeline().displayed && !timeline().locked"></i>
            <i class="pi pi-trash !text-1xl hover:cursor-pointer hover:text-danger" pTooltip="delete" showDelay="300" tooltipPosition="top" (click)="timelineDelete()" *ngIf="editActive && !timeline().displayed && !timeline().default"></i>
            <i class="pi pi-save !text-1xl hover:cursor-pointer hover:text-highlight" pTooltip="save" showDelay="300" tooltipPosition="top" (click)="timelineSave()" *ngIf="editActive"></i>
            <i class="pi pi-times !text-1xl hover:cursor-pointer hover:text-danger" pTooltip="drop changes" showDelay="300" tooltipPosition="top" (click)="editClose()" *ngIf="editActive"></i>
        </div>
    </div>
    <div class="flex flex-row gap-2">
        @for (sid of timeline().screen_ids; track sid) {
        <element-screen [screen]="screens().get(sid)!" [screenTemplates]="screenTemplates()" [medias]="medias()" [users]="users()" [currentUser]="currentUser()"></element-screen>
        }
    </div>
    <p-slider class="w-full mt-2 mb-1 pl-1 pr-1" pTooltip="start position" showDelay="300" tooltipPosition="bottom" [(ngModel)]="timeline().start_pos" [disabled]="!editActive" [min]="0" [max]="timeline().screen_ids.length" *ngIf="!timeline().displayed" />
    <p-slider class="w-full mt-2 mb-1 pl-1 pr-1" pTooltip="current position" showDelay="300" tooltipPosition="bottom" [(ngModel)]="timeline().current_pos" [disabled]="true" [min]="0" [max]="timeline().screen_ids.length * 2" *ngIf="timeline().displayed" />
</div>
