<div class="flex flex-col p-2 gap-2">
    @for (kiosk of kiosks.values(); track kiosk.id) {
    <element-kiosk [kiosk]="kiosk" [users]="users" [currentUser]="currentUser" [timelineTemplates]="timelineTemplates" [timelines]="timelines" [screens]="screens" [screenTemplates]="screenTemplates" [timelinesChanged]="timelinesChanged" (editResult)="kioskEdited($event)" (timelineEdited)="timelineEdited($event)"></element-kiosk>
    }
</div>

<!-- SCREENS PANEL MODAL -->
<panel-screens [screens]="screens" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" (screenEdited)="screenEdited($event)" [(isActive)]="panelScreensActive" *ngIf="panelScreensActive"></panel-screens>

<!-- TIMELINETEMPLATES PANEL MODAL -->
<panel-timeline-templates [timelineTemplates]="timelineTemplates" [screens]="screens" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" (timelineTemplateEdited)="timelineTemplateEdited($event)" (screenEdited)="screenEdited($event)" [(isActive)]="panelTimelineTemplatesActive" *ngIf="panelTimelineTemplatesActive"></panel-timeline-templates>

<p-speedDial [model]="menuItems" direction="left" mask [tooltipOptions]="{ tooltipPosition: 'top' }" buttonClassName="p-button-outlined"></p-speedDial>
