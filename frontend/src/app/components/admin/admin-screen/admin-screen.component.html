<p>admin-screen works!</p>

<div class="flex flex-row gap-2">
    @for (screen of screens.values(); track screen.id) {
    <element-screen [screen]="screen" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" (editResult)="screenEdited($event)"></element-screen>
    }
</div>
@for (tt of timelineTemplates.values(); track tt.id) {
<element-timeline-template [timelineTemplate]="tt" [screens]="screens" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" (editResult)="timelineTemplateEdited($event)" (screenEdited)="screenEdited($event)"></element-timeline-template>
}

<!-- CREATE SCREEN MODAL -->
<p-dialog [modal]="true" [(visible)]="createScreenActive">
    <ng-template #headless>
        <element-screen [screen]="createScreenDummy" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" [editMode]="true" (editResult)="screenEdited($event)" *ngIf="createScreenActive"></element-screen>
    </ng-template>
</p-dialog>

<!-- CREATE TIMELINETEMPLATE MODAL -->
<p-dialog [modal]="true" [(visible)]="createTimelineTemplateActive">
    <ng-template #headless>
        <element-timeline-template [timelineTemplate]="createTimelineTemplateDummy" [screens]="screens" [screenTemplates]="screenTemplates" [users]="users" [currentUser]="currentUser" [editMode]="true" (editResult)="timelineTemplateEdited($event)" (screenEdited)="screenEdited($event)" *ngIf="createTimelineTemplateActive"></element-timeline-template>
    </ng-template>
</p-dialog>

<p-speedDial [model]="menuItems" direction="left" mask [tooltipOptions]="{ tooltipPosition: 'top' }" buttonClassName="p-button-outlined"></p-speedDial>
