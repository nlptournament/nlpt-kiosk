- name: Setup RaspberryPis to serve as a Kiosk
  hosts: beamerpis
  become: true

  tasks:
    - name: Setting distribution_release shortcuts
      ansible.builtin.set_fact:
        is_bookworm: "{{ ansible_facts['distribution_release'] == 'bookworm' }}"
        is_trixie: "{{ ansible_facts['distribution_release'] == 'trixie' }}"

    ### Enable wayland

    - name: check wayland is enabled
      ansible.builtin.command: raspi-config nonint is_wayfire
      ignore_errors: true
      register: wayland
      changed_when: wayland.rc != 0
      when: is_bookworm

    - name: check wayland is enabled
      ansible.builtin.command: raspi-config nonint is_labwc
      ignore_errors: true
      register: wayland
      changed_when: wayland.rc != 0
      when: is_trixie

    - name: enable wayland
      ansible.builtin.command: raspi-config nonint do_wayland W2
      when: wayland.rc != 0
      notify: Reboot Pi

    ### Enable autologin

    - name: check autologin is enabled
      ansible.builtin.command: raspi-config nonint get_autologin
      register: autologin
      when: wayland.rc == 0
      changed_when: autologin.rc != 0

    - name: enable autologin to desktop
      ansible.builtin.command: raspi-config nonint do_boot_behaviour B4
      when: wayland.rc == 0 and autologin.stdout != "0"
      notify: Reboot Pi

    ### Set timezone

    - name: check timezone
      ansible.builtin.command: cat /etc/timezone
      register: timezone
      changed_when: timezone.rc != 0

    - name: change timezone
      ansible.builtin.command: "raspi-config nonint do_change_timezone {{ kiosk_timezone }}"
      when: timezone.stdout != kiosk_timezone
      notify: Reboot Pi

    ### Enable vnc-server

    - name: check vnc-server is enabled
      ansible.builtin.command: raspi-config nonint get_vnc
      register: vnc
      when: kiosk_enable_vnc and wayland.rc == 0
      changed_when: vnc.rc != 0

    - name: enable vnc-server
      ansible.builtin.command: raspi-config nonint do_vnc 0
      when: kiosk_enable_vnc and wayland.rc == 0 and vnc.stdout != "0"

    # TODO: disable wayvnc auth


    ### Configure NTP Client

    - name: copy ntp (client) configuration
      template:
        src: templates/timesyncd.conf.j2
        dest: /etc/systemd/timesyncd.conf
      when: timezone.stdout == kiosk_timezone
      notify: Restart Timesynced

    ### Configure Bookworm specific autostart

    - name: hide-cursor plugin config
      ansible.builtin.copy:
        src: files/hide-cursor.xml
        dest: /usr/share/wayfire/metadata/hide-cursor.xml
        owner: root
        group: root
        mode: '0644'
      when: is_bookworm

    - name: hide-cursor plugin binary
      ansible.builtin.copy:
        src: files/libhide-cursor.so
        dest: /usr/lib/aarch64-linux-gnu/wayfire/libhide-cursor.so
        owner: root
        group: root
        mode: '0755'
      when: is_bookworm

    - name: copy wayfire configuration
      template:
        src: templates/wayfire.ini.j2
        dest: /home/pi/.config/wayfire.ini
        owner: "{{ ansible_user }}"
        mode: '0644'
      notify: Reboot Pi
      when: is_bookworm

    ### Configure Trixie specific autostart

    - name: install wtype
      ansible.builtin.apt:
        update_cache: true
        name:
          - wtype
        state: present
      when: is_trixie

    - name: copy rc.xml configuration
      template:
        src: templates/trixie/rc.xml.j2
        dest: "/home/{{ ansible_user }}/.config/labwc/rc.xml"
        owner: "{{ ansible_user }}"
        mode: '0644'
      notify: Reboot Pi
      when: is_trixie

    - name: copy autostart configuration
      template:
        src: templates/trixie/autostart.j2
        dest: "/home/{{ ansible_user }}/.config/labwc/autostart"
        owner: "{{ ansible_user }}"
        mode: '0644'
      register: autostart_conf
      notify: Reboot Pi
      when: is_trixie

    - name: copy autostart configuration to etc
      template:
        src: templates/trixie/etc-autostart.j2
        dest: /etc/xdg/labwc/autostart
        owner: root
        group: root
        mode: '0644'
      notify: Reboot Pi
      when: is_trixie

    - name: disable keyring
      ansible.builtin.command: bash -c "chmod a-x /usr/bin/gnome-keyring*"
      when: autostart_conf.changed

  handlers:
    - name: Restart Timesynced
      service:
        name: systemd-timesyncd
        state: restarted

    - name: Reboot Pi
      ansible.builtin.reboot:
        msg: "Rebooting machine due to Ansible run"
